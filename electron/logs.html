<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<title>Dota 2 Tracker — Логи</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c12;
    --bg2: #12151f;
    --border: rgba(255,255,255,0.08);
    --text: #c8ccd8;
    --muted: #4a5168;
    --accent: #6c8cff;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --purple: #a78bfa;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; overflow: hidden; }

  .titlebar {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    background: rgba(0,0,0,0.5);
    border-bottom: 1px solid var(--border);
    -webkit-app-region: drag;
    user-select: none;
    flex-shrink: 0;
  }
  .titlebar-title { font-size: 11px; font-weight: 600; color: var(--text); font-family: 'Segoe UI', sans-serif; flex: 1; letter-spacing: 0.05em; }
  .tb-btn {
    width: 14px; height: 14px; border-radius: 50%; border: none; cursor: pointer;
    font-size: 9px; display: flex; align-items: center; justify-content: center;
    -webkit-app-region: no-drag;
  }
  .tb-close { background: #f87171; }
  .tb-min { background: #facc15; }

  .toolbar {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 3px 10px; border-radius: 3px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; font-size: 11px;
    font-family: 'Segoe UI', sans-serif; transition: all 0.1s;
  }
  .filter-btn.active { background: rgba(108,140,255,0.15); color: var(--accent); border-color: rgba(108,140,255,0.3); }
  .filter-btn.lvl-info.active { background: rgba(74,222,128,0.1); color: var(--green); border-color: rgba(74,222,128,0.25); }
  .filter-btn.lvl-warn.active { background: rgba(250,204,21,0.1); color: var(--yellow); border-color: rgba(250,204,21,0.25); }
  .filter-btn.lvl-error.active { background: rgba(248,113,113,0.1); color: var(--red); border-color: rgba(248,113,113,0.25); }
  .filter-btn.lvl-gsi.active { background: rgba(167,139,250,0.1); color: var(--purple); border-color: rgba(167,139,250,0.25); }

  .sep { width: 1px; height: 16px; background: var(--border); }
  .spacer { flex: 1; }
  .clear-btn {
    padding: 3px 10px; border-radius: 3px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; font-size: 11px;
    font-family: 'Segoe UI', sans-serif;
  }
  .clear-btn:hover { color: var(--red); border-color: rgba(248,113,113,0.3); }

  .search-input {
    height: 24px; padding: 0 8px; background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); border-radius: 3px;
    color: var(--text); font-size: 11px; width: 160px; outline: none;
    font-family: 'Consolas', monospace;
  }
  .search-input:focus { border-color: rgba(108,140,255,0.4); }

  .log-container {
    flex: 1; overflow-y: auto; padding: 4px 0;
    display: flex; flex-direction: column;
  }
  body { display: flex; flex-direction: column; }

  .log-entry {
    display: grid;
    grid-template-columns: 58px 46px 1fr;
    gap: 0 8px;
    padding: 2px 10px;
    line-height: 1.5;
    border-left: 2px solid transparent;
    transition: background 0.1s;
  }
  .log-entry:hover { background: rgba(255,255,255,0.03); }
  .log-entry.level-INFO { border-left-color: rgba(74,222,128,0.4); }
  .log-entry.level-WARN { border-left-color: rgba(250,204,21,0.4); background: rgba(250,204,21,0.03); }
  .log-entry.level-ERROR { border-left-color: rgba(248,113,113,0.5); background: rgba(248,113,113,0.04); }
  .log-entry.level-GSI { border-left-color: rgba(167,139,250,0.4); }
  .log-entry.level-API { border-left-color: rgba(108,140,255,0.4); }
  .log-entry.hidden { display: none; }

  .ts { color: var(--muted); font-size: 10px; padding-top: 1px; white-space: nowrap; }
  .lvl { font-size: 10px; font-weight: 600; white-space: nowrap; padding-top: 1px; }
  .lvl.INFO { color: var(--green); }
  .lvl.WARN { color: var(--yellow); }
  .lvl.ERROR { color: var(--red); }
  .lvl.GSI { color: var(--purple); }
  .lvl.API { color: var(--accent); }

  .msg { color: var(--text); word-break: break-all; }
  .msg .hl { color: var(--accent); }
  .msg .match-id { color: var(--yellow); font-weight: 600; }
  .msg .player-name { color: var(--green); }

  .status-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 4px 10px; border-top: 1px solid var(--border);
    font-size: 10px; color: var(--muted); flex-shrink: 0;
    font-family: 'Segoe UI', sans-serif;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.on { background: var(--green); animation: pulse 2s infinite; }
  .status-dot.off { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .autoscroll-btn {
    margin-left: auto; padding: 2px 8px; border-radius: 3px;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; font-size: 10px; font-family: 'Segoe UI', sans-serif;
  }
  .autoscroll-btn.active { color: var(--green); border-color: rgba(74,222,128,0.3); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<div class="titlebar">
  <div style="width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#6c8cff,#a78bfa)"></div>
  <span class="titlebar-title">DOTA 2 TRACKER — ЛОГИ</span>
  <button class="tb-btn tb-min" onclick="window.electronLogs?.minimize()" title="Свернуть">−</button>
  <button class="tb-btn tb-close" onclick="window.electronLogs?.close()" title="Закрыть">×</button>
</div>

<div class="toolbar">
  <button class="filter-btn active" data-filter="ALL" onclick="setFilter('ALL', this)">Все</button>
  <div class="sep"></div>
  <button class="filter-btn lvl-info" data-filter="INFO" onclick="setFilter('INFO', this)">INFO</button>
  <button class="filter-btn lvl-warn" data-filter="WARN" onclick="setFilter('WARN', this)">WARN</button>
  <button class="filter-btn lvl-error" data-filter="ERROR" onclick="setFilter('ERROR', this)">ERROR</button>
  <button class="filter-btn lvl-gsi" data-filter="GSI" onclick="setFilter('GSI', this)">GSI</button>
  <button class="filter-btn" data-filter="API" onclick="setFilter('API', this)" style="">API</button>
  <div class="sep"></div>
  <input class="search-input" id="search" placeholder="Поиск..." oninput="applySearch()" />
  <div class="spacer"></div>
  <button class="clear-btn" onclick="clearLogs()">Очистить</button>
</div>

<div class="log-container" id="log-container"></div>

<div class="status-bar">
  <div class="status-dot off" id="status-dot"></div>
  <span id="status-text">Ожидание сервера...</span>
  <span id="log-count">0 записей</span>
  <button class="autoscroll-btn active" id="autoscroll-btn" onclick="toggleAutoscroll()">↓ Авто-прокрутка</button>
</div>

<script>
let logs = [];
let activeFilter = 'ALL';
let autoscroll = true;
let totalCount = 0;
const container = document.getElementById('log-container');

function pad(n) { return String(n).padStart(2, '0'); }
function ts() {
  const d = new Date();
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function colorize(msg) {
  return msg
    .replace(/(\d{7,})/g, '<span class="match-id">$1</span>')
    .replace(/\[([^\]]+)\]/g, (m, p) => `<span class="hl">[${p}]</span>`)
    .replace(/(ERROR|FAIL|failed|error)/gi, '<span style="color:#f87171">$1</span>')
    .replace(/(OK|success|готово|загружено|подключен)/gi, '<span style="color:#4ade80">$1</span>');
}

function addLog(level, message, source) {
  const entry = { id: totalCount++, ts: ts(), level, message, source: source || '' };
  logs.push(entry);
  if (logs.length > 2000) logs.shift();

  const el = document.createElement('div');
  el.className = `log-entry level-${level}`;
  el.dataset.level = level;
  el.dataset.msg = message.toLowerCase();
  el.innerHTML = `
    <span class="ts">${entry.ts}</span>
    <span class="lvl ${level}">${level}</span>
    <span class="msg">${colorize(message)}</span>
  `;

  const search = document.getElementById('search').value.toLowerCase();
  if ((activeFilter !== 'ALL' && activeFilter !== level) ||
      (search && !message.toLowerCase().includes(search))) {
    el.classList.add('hidden');
  }

  container.appendChild(el);
  if (container.children.length > 2000) container.removeChild(container.firstChild);
  document.getElementById('log-count').textContent = `${totalCount} записей`;
  if (autoscroll) container.scrollTop = container.scrollHeight;
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.log-entry').forEach(el => {
    const lvl = el.dataset.level;
    const search = document.getElementById('search').value.toLowerCase();
    const matchFilter = filter === 'ALL' || lvl === filter;
    const matchSearch = !search || el.dataset.msg.includes(search);
    el.classList.toggle('hidden', !(matchFilter && matchSearch));
  });
}

function applySearch() {
  const search = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.log-entry').forEach(el => {
    const lvl = el.dataset.level;
    const matchFilter = activeFilter === 'ALL' || lvl === activeFilter;
    const matchSearch = !search || el.dataset.msg.includes(search);
    el.classList.toggle('hidden', !(matchFilter && matchSearch));
  });
}

function clearLogs() {
  logs = [];
  container.innerHTML = '';
  addLog('INFO', 'Логи очищены');
}

function toggleAutoscroll() {
  autoscroll = !autoscroll;
  const btn = document.getElementById('autoscroll-btn');
  btn.classList.toggle('active', autoscroll);
  btn.textContent = autoscroll ? '↓ Авто-прокрутка' : '○ Авто-прокрутка';
}

// ─── Polling логов с сервера ──────────────────────────────────────────────────
let lastLogId = 0;

async function pollLogs() {
  try {
    const r = await fetch(`http://localhost:3001/logs?since=${lastLogId}`);
    if (!r.ok) throw new Error();
    const data = await r.json();

    document.getElementById('status-dot').className = 'status-dot on';
    document.getElementById('status-text').textContent = `GSI сервер онлайн — порт 3001`;

    if (data.logs?.length) {
      data.logs.forEach(l => {
        if (l.id > lastLogId) {
          lastLogId = l.id;
          addLog(l.level, l.message);
        }
      });
    }
  } catch {
    document.getElementById('status-dot').className = 'status-dot off';
    document.getElementById('status-text').textContent = 'Сервер недоступен — запусти ЗАПУСТИТЬ.bat';
  }
}

// Стартовые сообщения
addLog('INFO', 'Окно логов запущено');
addLog('INFO', 'Ожидание подключения к GSI серверу (localhost:3001)...');

setInterval(pollLogs, 800);

// IPC от Electron если доступен
if (window.electronLogs) {
  window.electronLogs.onLog((level, msg) => addLog(level, msg));
}
</script>
</body>
</html>
